<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Arsip Desa</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>📂 ArsipDesa</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="{{ url_for('index') }}" class="nav-item {{ 'active' if request.endpoint == 'index' else '' }}">
                    <span class="nav-icon">📊</span> Dashboard
                </a>
                <a href="{{ url_for('add') }}" class="nav-item {{ 'active' if request.endpoint == 'add' else '' }}">
                    <span class="nav-icon">📝</span> Tambah Arsip
                </a>
                <a href="{{ url_for('settings') }}"
                    class="nav-item {{ 'active' if request.endpoint == 'settings' else '' }}">
                    <span class="nav-icon">⚙️</span> Pengaturan
                </a>
            </nav>
            <div class="sidebar-footer">
                <a href="{{ url_for('logout') }}"
                    style="color: #ef4444; text-decoration: none; font-weight: 600; display: block; margin-bottom: 1rem;">
                    🚪 Logout
                </a>
                <p>&copy; 2026 Kerja Praktik</p>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="content-wrapper">
                {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                <div class="flash-messages">
                    {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                    {% endfor %}
                </div>
                {% endif %}
                {% endwith %}

                {% block content %}{% endblock %}
            </div>
        </main>
    </div>
</body>

</html>
